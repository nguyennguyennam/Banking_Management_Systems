server:
  port: 8080
spring:
  application:
    name: bvb-banking
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true

  # ── Database (Neon PostgreSQL) ──
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
      idle-timeout: 600000
      keepalive-time: 300000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    ignore-missing-migrations: true

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
  # ── Cache ──
  cache:
    type: redis
    redis:
      time-to-live: 3600000

  # ── Security ──
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET}  # min 256-bit key

# ── JWT custom props ──
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, modulith
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      roles: ADMIN
  metrics:
    export:
      prometheus:
        enabled: true
  info:
    env:
      enabled: true

# ── Springdoc ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ── Logging ──
logging:
  level:
    com.bvb: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

debug: true